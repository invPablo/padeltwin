name: EAS Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Channel view (preview)
        run: npx eas-cli channel:view preview --json || npx eas-cli channel:view preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Recent Android builds
        run: npx eas-cli build:list --platform android --limit 10 --non-interactive --json || npx eas-cli build:list --platform android --limit 10 --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Recent updates (preview channel)
        run: npx eas-cli update:list --channel preview --limit 10 --non-interactive --json || npx eas-cli update:list --channel preview --limit 10 --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
